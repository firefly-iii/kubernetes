{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "firefly-iii.fullname" . }}
  labels:
    {{- include "firefly-iii.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  hostnames:
    {{- toYaml .Values.httpRoute.hostnames | nindent 4 }}
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  rules:
    - backendRefs:
        - kind: Service
          name: {{ include "firefly-iii.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
      {{- with .Values.httpRoute.filters }}
      filters: {{- toYaml . | nindent 8 }}
      {{- end }}
      matches:
        - path:
            type: PathPrefix
            value: /
    {{- with .Values.httpRoute.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
